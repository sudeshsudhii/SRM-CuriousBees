version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: srm_curiousbees_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: srm_curiousbees_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: srm_curiousbees_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
    driver: local
