version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: srm_curiousbees_postgres_dev
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: srm_curiousbees_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d srm_curiousbees_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: srm_curiousbees_redis_dev
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: node:22-alpine
    container_name: srm_curiousbees_api_dev
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npm run db:generate && npm run dev:api"
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/srm_curiousbees_db?schema=public
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/srm_curiousbees_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DEVELOPMENT_MODE: "true"
      FRONTEND_URL: http://localhost:3000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/apps/web/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: node:22-alpine
    container_name: srm_curiousbees_web_dev
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npm run dev:web"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_DEVELOPMENT_MODE: "true"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/api/node_modules
    depends_on:
      - api

volumes:
  postgres_data_dev:
    driver: local
