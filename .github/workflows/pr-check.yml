name: CuriousBees V2 CI Pipeline

on:
  push:
    branches: [ main, master, staging, dev ]
  pull_request:
    branches: [ main, master, staging, dev ]

jobs:
  validate:
    name: Code Validation (Lint, Typecheck, Build)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Monorepo Dependencies
        run: npm install --legacy-peer-deps

      - name: Run Prisma Generate
        run: npm run db:generate

      - name: Run ESLint Checks
        run: npm run lint

      - name: Run TypeScript Compiler Checks (Typecheck)
        run: npm run typecheck

      - name: Run Production Compilation (Build)
        run: npm run build
        env:
          # Inject mockup environment values to satisfy Zod startup/build validation
          NODE_ENV: production
          DEVELOPMENT_MODE: "true"
          PORT: 4000
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/srm_curiousbees_db?schema=public
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/srm_curiousbees_db?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          FRONTEND_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_DEVELOPMENT_MODE: "true"
